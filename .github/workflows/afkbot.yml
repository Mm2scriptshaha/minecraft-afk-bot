name: Minecraft AFK Bot

on:
  schedule:
    - cron: '50 */4 * * *'
  workflow_dispatch:

concurrency:
  group: minecraft-afk-bot-main
  cancel-in-progress: true

jobs:
  run-bot:
    name: Run AFK Bot
    runs-on: ubuntu-latest
    timeout-minutes: 295

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm install

      - name: Start AFK Bot
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          BOT_USERNAME: ${{ secrets.BOT_USERNAME }}
          MC_VERSION: ${{ secrets.MC_VERSION }}
          GEMINI_KEY_1: ${{ secrets.GEMINI_KEY_1 }}
          GEMINI_KEY_2: ${{ secrets.GEMINI_KEY_2 }}
          GEMINI_KEY_3: ${{ secrets.GEMINI_KEY_3 }}
          GEMINI_KEY_4: ${{ secrets.GEMINI_KEY_4 }}
          GEMINI_KEY_5: ${{ secrets.GEMINI_KEY_5 }}
        run: node bot.js
